name: Pip install release smoke test

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  pip-install-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install from PyPI
        run: python -m pip install unsim

      - name: Smoke test
        run: python -m pytest -q tests/test_verification_straight_road.py::test_1link
