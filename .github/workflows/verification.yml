name: Verification

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install numpy pandas matplotlib pillow pytest jax[cpu]

      - name: Run tests
        run: |
          python -m pytest tests/ -v

      - name: DUO comparison report (Kuwahara + Grid)
        run: |
          python tests/test_duo.py
