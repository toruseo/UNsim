name: Verification

on:
  push:
  pull_request:
  workflow_dispatch:  
  schedule:
    - cron: '0 6 * * 1'


jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install numpy pandas matplotlib pillow pytest jax[cpu]

      - name: Run tests
        run: |
          python -m pytest tests/ -v

      - name: DUO comparison report (Kuwahara + Grid)
        run: |
          python tests/test_duo.py

      - name: Upload DUO report PNGs
        uses: actions/upload-artifact@v7
        with:
          name: duo-report-pngs
          path: docs/img/*.png
          if-no-files-found: warn
