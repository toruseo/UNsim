name: Verification

on:
  push:
  pull_request:
  workflow_dispatch:  
  schedule:
    - cron: '0 6 * * 1'


jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install numpy pandas matplotlib pillow pytest jax[cpu]

      - name: Run tests
        run: |
          python -m pytest tests/ -v
