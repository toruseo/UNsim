name: Verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install numpy pandas matplotlib pillow pytest jax[cpu]

      - name: Run tests
        run: |
          python -m pytest tests/ -v

      - name: DUO comparison report
        if: matrix.python-version == '3.12'
        run: |
          python tests/test_duo_comparison.py

      - name: Upload DUO comparison figure
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: duo-py-vs-jax
          path: artifacts/duo_py_vs_jax.png

      - name: Kuwahara Fig.5 comparison
        if: matrix.python-version == '3.12'
        run: |
          python tests/test_kuwahara_fig5.py

      - name: Upload Kuwahara comparison figure
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: kuwahara-fig6-7-comparison
          path: artifacts/kuwahara_fig6_7_comparison.png